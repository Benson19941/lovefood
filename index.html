<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我家寶寶的美食地圖</title>
    <style>
        :root {
            --primary-color: #4a4a4a;
            --overlay-white: rgba(255, 255, 255, 0.85);
            --accent-color: #8d775f; 
            --glass: rgba(255, 255, 255, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            color: var(--primary-color);
            line-height: 1.6;
        }

        /* 背景設定 */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('img/1.jpg'); /* 您的本地背景 */
            background-size: cover;
            background-position: center;
            opacity: 0.5; /* 稍微調低一點讓背景更有質感 */
        }

        /* 版面改為 Flex 配置以解決右側空白 */
        .main-layout {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
            padding: 40px 20px;
        }

        .content-main {
            flex: 2; /* 左側內容區佔較多空間 */
        }

        .sidebar {
            flex: 1; /* 右側側邊欄佔 1/3 */
            position: sticky;
            top: 40px;
            height: fit-content;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 5px;
            border-bottom: 1px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        .region-name {
            font-size: 1.2rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 美食卡片優化 */
        .food-card {
            background: var(--overlay-white);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* 處理多張圖片的展示 */
        .image-gallery {
            display: flex;
            height: 250px;
            gap: 2px;
            background: #fff;
        }

        .image-gallery img {
            width: 33.33%;
            height: 100%;
            object-fit: cover;
            transition: width 0.3s;
        }

        .image-gallery img:hover {
            width: 50%; /* 滑過時放大 */
        }

        .food-content {
            padding: 25px;
        }

        .food-name {
            font-size: 1.4rem;
            margin: 0 0 15px 0;
            color: #2c3e50;
        }

        .food-intro {
            font-size: 1rem;
            color: #555;
            margin-bottom: 20px;
            border-left: 2px solid #ddd;
            padding-left: 15px;
        }

        /* 音樂播放器樣式 */
        .music-player {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        .music-info h4 { margin: 0; letter-spacing: 1px; }
        .music-info p { font-size: 0.8rem; opacity: 0.7; margin: 5px 0 20px 0; }

        .control-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .control-btn:hover { transform: scale(1.05); }

        /* RWD */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { position: static; order: -1; } /* 音樂移到上方 */
            .image-gallery { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="background-wrapper"></div>

    <div class="main-layout">
        <div class="content-main">
            <header>
                <h1>我家寶寶的美食地圖</h1>
            </header>

            <section class="category-section">
                <h2 style="text-align:center; color: var(--accent-color); margin-bottom:40px;">主食</h2>
                
                <div class="region-group">
                    <div class="region-name">北部</div>
                    
                    <article class="food-card">
                        <div class="image-gallery">
                            <img src="img/初魚/2.jfif" alt="初魚1">
                            <img src="img/初魚/1.jfif" alt="初魚2">
                            <img src="img/初魚/3.jfif" alt="初魚3">
                        </div>
                        
                        <div class="food-content">
                            <h3 class="food-name">初魚｜鮨 · 鉄板料亭-台北101</h3>
                            <div class="food-intro">
                                「黑鮪魚大腹部超頂，今天是我們林大小姐請客，我愛你喔。」
                            </div>
                            <a href="https://www.chu-yu.com.tw/" class="food-link" target="_blank">查看詳情</a>
                        </div>
                    </article>
                    
                </div>
            </section>

            <section class="category-section">
                <h2 style="text-align:center; color: var(--accent-color); margin-bottom:40px;">想吃</h2>
                
                <div class="region-group">                    
                    <article class="food-card">            
                        <div class="food-content">
                            <h3 class="food-name">囍甜 日式舒芙蕾蛋糕專賣店</h3>
                            <a href="https://2like2.com/" class="food-link" target="_blank">查看詳情</a>
                        </div>
                    </article>
                    
                </div>

            </section>

            


        </div>

        <aside class="sidebar">
            <div class="music-player">
                <div class="music-info">
                    <h4>MUSIC</h4>
                    <p>正在播放：JVKE - her (official lyric video)</p>
                </div>
                
                <button class="control-btn" onclick="toggleMusic()" id="playBtn">播放音樂</button>
                
                <audio id="bgMusic" loop>
                    <source src="music/JVKE - her (official lyric video) - JVKE (youtube).m4a" type="audio/mpeg">
                </audio>
            </div>

            <div style="margin-top: 30px; padding: 20px; font-size: 0.85rem; color: #666;">
                <p>📍 <b>快速導覽</b></p>
                <p>北部</p>
                <p>中部</p>
                <p>南部</p>
            </div>
        </aside>
    </div>

    <script>
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('playBtn');
            if (music.paused) {
                music.play();
                btn.innerText = "暫停播放";
            } else {
                music.pause();
                btn.innerText = "播放音樂";
            }
        }
    </script>

</body>
</html>
